name: Deploy Web

# 触发条件：webversion/ 下任何文件变更时构建
on:
  push:
    branches: [main]
    paths:
      - 'webversion/**'
  pull_request:
    branches: [main]
    paths:
      - 'webversion/**'
  workflow_dispatch:

# 全局并发：避免同一资源被多任务争抢
concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------
  # 任务 1：构建 → 部署 Vercel（主备之一，国内慢 ≈ 1000-3000 ms）
  # 触发条件：仅 push 到 main 时部署；PR 只构建不部署
  # ---------------------------------------------------------------
  deploy-vercel:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('webversion/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: cd webversion && pnpm install --frozen-lockfile

      - name: Build (default site=EdgeOne, base=/)
        run: cd webversion && pnpm build

      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd webversion && npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Upload Vercel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webversion-build-vercel
          path: webversion/dist/
          retention-days: 7

  # ---------------------------------------------------------------
  # 任务 2：构建 → 部署 GitHub Pages（海外镜像，国内慢 ≈ 1000-5000 ms）
  # 触发条件：仅 push 到 main 时部署
  # 输出 URL：https://<owner>.github.io/<repo>/
  # ---------------------------------------------------------------
  deploy-pages:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('webversion/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: cd webversion && pnpm install --frozen-lockfile

      - name: Build (site=GitHub Pages, base=/repo/)
        run: cd webversion && pnpm build
        env:
          GITHUB_PAGES: 'true'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Add .nojekyll (跳过 Jekyll，避免 _astro/ 目录被忽略)
        run: touch webversion/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webversion/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'webversion/**'
  pull_request:
    branches: [main]
    paths:
      - 'webversion/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Install pnpm
      run: corepack enable && corepack prepare pnpm@latest
    
    - name: Cache pnpm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('webversion/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-
    
    - name: Install dependencies
      run: cd webversion && pnpm install
    
    - name: Build
      run: cd webversion && pnpm build
    
    - name: Deploy to Vercel
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        cd webversion
        npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webversion-build
        path: webversion/dist/
        retention-days: 30
