name: Build LaTeX PDF

on:
  push:
    branches: [ main, master ]
    paths:
      - '智慧银行实验教程chapters/**'
      - '.github/workflows/build-pdf.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '智慧银行实验教程chapters/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 智慧银行实验教程.tex
          working_directory: 智慧银行实验教程chapters
          latexmk_use_xelatex: true
          # 安装额外的宏包
          extra_system_packages: |
            texlive-lang-chinese
            texlive-fonts-recommended
            texlive-fonts-extra
            texlive-latex-extra
            texlive-bibtex-extra
            biber

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: 智慧银行实验教程
          path: 智慧银行实验教程chapters/智慧银行实验教程.pdf
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: 智慧银行实验教程chapters/智慧银行实验教程.pdf
          name: 智慧银行实验教程 ${{ github.ref_name }}
          body: |
            ## 智慧银行实验教程 ${{ github.ref_name }}
            
            ### 更新内容
            - 自动编译的PDF版本
            - 基于 ${{ github.sha }} 提交
            
            ### 文件说明
            - `智慧银行实验教程.pdf` - 完整教程PDF（379页）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
