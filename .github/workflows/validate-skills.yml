name: Validate Skills

on:
  push:
    branches: [main, master]
    paths:
      - 'qoder-skills-library/**'
      - '.agents/skills/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'qoder-skills-library/**'
      - '.agents/skills/**'

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
    
    - name: Validate SKILL.md frontmatter
      run: |
        python -c "
        import yaml
        import os
        from pathlib import Path
        
        def validate_skill_md(skill_path):
            skill_md = skill_path / 'SKILL.md'
            if not skill_md.exists():
                return False, 'SKILL.md文件不存在'
            
            try:
                content = skill_md.read_text(encoding='utf-8')
                if not content.startswith('---'):
                    return False, '文件不以---开头'
                
                parts = content.split('---', 2)
                if len(parts) < 3:
                    return False, '文件格式错误'
                
                frontmatter = parts[1]
                data = yaml.safe_load(frontmatter)
                
                if not isinstance(data, dict):
                    return False, '前置数据不是字典格式'
                
                # 检查必需字段
                required_fields = ['name', 'description', 'workflow_stage', 'compatibility', 'author', 'version', 'tags']
                for field in required_fields:
                    if field not in data:
                        return False, f'缺少必需字段: {field}'
                
                # 检查名称匹配
                expected_name = skill_path.name
                actual_name = data.get('name')
                if actual_name != expected_name:
                    return False, f'技能名称不匹配: 期望 {expected_name}, 实际 {actual_name}'
                
                # 检查工作流阶段
                valid_stages = ['ideation', 'literature', 'theory', 'data', 'analysis', 'writing', 'communication', 'engineering']
                workflow_stage = data.get('workflow_stage')
                if workflow_stage not in valid_stages:
                    return False, f'无效的工作流阶段: {workflow_stage}'
                
                # 检查兼容性
                compatibility = data.get('compatibility')
                if not isinstance(compatibility, list) or len(compatibility) == 0:
                    return False, '兼容性列表无效'
                
                valid_platforms = ['claude-code', 'cursor', 'codex', 'gemini-cli']
                for platform in compatibility:
                    if platform not in valid_platforms:
                        return False, f'无效的兼容性平台: {platform}'
                
                # 检查版本号
                version = data.get('version')
                if not isinstance(version, str):
                    return False, '版本号不是字符串格式'
                
                import re
                if not re.match(r'^\d+\.\d+\.\d+$', version):
                    return False, f'版本号格式无效: {version}'
                
                # 检查标签
                tags = data.get('tags')
                if not isinstance(tags, list) or len(tags) == 0:
                    return False, '标签列表无效'
                
                for tag in tags:
                    if not isinstance(tag, str) or not tag.islower():
                        return False, f'标签格式无效: {tag}'
                
                # 检查描述
                description = data.get('description')
                if not isinstance(description, str) or len(description) == 0:
                    return False, '描述无效'
                
                if len(description) > 100:
                    return False, '描述长度超过100个字符'
                
                return True, '验证通过'
                
            except Exception as e:
                return False, f'验证失败: {str(e)}'
        
        # 验证所有技能
        skills_dir = Path('qoder-skills-library')
        errors = []
        validated = 0
        
        for skill_dir in skills_dir.iterdir():
            if skill_dir.is_dir() and not skill_dir.name.startswith('.'):
                for sub_dir in skill_dir.iterdir():
                    if sub_dir.is_dir() and not sub_dir.name.startswith('.'):
                        skill_md = sub_dir / 'SKILL.md'
                        if skill_md.exists():
                            validated += 1
                            success, message = validate_skill_md(sub_dir)
                            if not success:
                                errors.append(f'{sub_dir}: {message}')
        
        # 验证.agents/skills目录
        agents_skills_dir = Path('.agents/skills')
        if agents_skills_dir.exists():
            for skill_dir in agents_skills_dir.iterdir():
                if skill_dir.is_dir() and not skill_dir.name.startswith('.'):
                    skill_md = skill_dir / 'SKILL.md'
                    if skill_md.exists():
                        validated += 1
                        success, message = validate_skill_md(skill_dir)
                        if not success:
                            errors.append(f'{skill_dir}: {message}')
        
        print(f'验证了 {validated} 个技能')
        
        if errors:
            print('发现以下错误:')
            for error in errors:
                print(f'  - {error}')
            exit(1)
        else:
            print('所有技能验证通过！')
        "
    
    - name: Validate skill count consistency
      run: |
        python -c "
        import yaml
        from pathlib import Path
        
        # 统计实际技能数量
        skills_dir = Path('qoder-skills-library')
        actual_count = 0
        
        for skill_dir in skills_dir.iterdir():
            if skill_dir.is_dir() and not skill_dir.name.startswith('.'):
                for sub_dir in skill_dir.iterdir():
                    if sub_dir.is_dir() and not sub_dir.name.startswith('.'):
                        skill_md = sub_dir / 'SKILL.md'
                        if skill_md.exists():
                            actual_count += 1
        
        # 统计.agents/skills目录
        agents_skills_dir = Path('.agents/skills')
        if agents_skills_dir.exists():
            for skill_dir in agents_skills_dir.iterdir():
                if skill_dir.is_dir() and not skill_dir.name.startswith('.'):
                    skill_md = skill_dir / 'SKILL.md'
                    if skill_md.exists():
                        actual_count += 1
        
        # 检查index文件
        index_file = skills_dir / 'meta' / '_index.yaml'
        if index_file.exists():
            with open(index_file, 'r', encoding='utf-8') as f:
                index_data = yaml.safe_load(f)
                index_count = index_data.get('total_skills', 0)
                
                if actual_count != index_count:
                    print(f'技能数量不一致: 实际 {actual_count}, 索引 {index_count}')
                    exit(1)
                else:
                    print(f'技能数量一致: {actual_count}')
        else:
            print(f'索引文件不存在，实际技能数量: {actual_count}')
        "
