[pytest]
# pytest配置文件
# 用于技能测试

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试标记
markers =
    slow: 标记为慢速测试
    integration: 集成测试
    e2e: 端到端测试

# 测试输出
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 测试发现模式
norecursedirs = 
    .git
    .github
    .vscode
    __pycache__
    *.egg-info
    dist
    build
    node_modules
    .venv
    _archived
    meta
    tests/templates

# 测试超时
timeout = 300

# 测试覆盖率
cov = .
cov-report = term-missing
cov-report = html
cov-fail-under = 50
